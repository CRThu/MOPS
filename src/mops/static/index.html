<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MOPS Dashboard</title>
  <script type="module" crossorigin src="/dashboard.js"></script>
  <link rel="stylesheet" crossorigin href="/dashboard.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span class="brand-text">MOPS</span>
      <span class="brand-sub">Dashboard</span>
    </div>
    <div class="header-meta">
      <span class="meta-item" id="hdr-uptime">--</span>
      <span class="meta-dot"></span>
      <span class="meta-item live" id="hdr-status">
        <span class="live-dot"></span> LIVE
      </span>
    </div>
  </header>

  <!-- Stats Bar -->
  <div id="stats-bar" class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total Traffic</div>
      <div class="stat-value" id="stat-traffic">0 B</div>
    </div>
    <div class="stat">
      <div class="stat-label">Speed</div>
      <div class="stat-value" id="stat-speed">0 B/s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active</div>
      <div class="stat-value" id="stat-conns">0</div>
    </div>
  </div>

  <!-- Main Content: 70/30 split -->
  <div id="main" class="main-area">
    <!-- Left: Topology -->
    <div class="topo-panel">
      <div id="topo-container"></div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-fit" title="Fit view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
        <button class="zoom-btn" id="zoom-autofit" title="Auto-fit on update">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.22-8.56"/><path d="M21 3v6h-6"/></svg>
        </button>
        <button class="zoom-btn" id="zoom-out" title="Zoom out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" id="zoom-in" title="Zoom in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
      </div>
      <div class="perf-overlay">
        <span id="perf-fps">-- FPS</span>
        <span class="perf-dot"></span>
        <span id="perf-render">render --ms</span>
      </div>
    </div>
    <!-- Right: Server Status Cards -->
    <div class="cards-panel">
      <div class="cards-header">
        <span>Server Status</span>
        <span class="cards-count" id="cards-count">0</span>
      </div>
      <div id="cards-list" class="cards-list">
        <div class="empty-hint">Discovering servers...</div>
      </div>
    </div>
  </div>

</body>
</html>
