<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MOPS Dashboard</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span class="brand-text">MOPS</span>
      <span class="brand-sub">Dashboard</span>
    </div>
    <div class="header-meta">
      <span class="meta-item" id="hdr-uptime">--</span>
      <span class="meta-dot"></span>
      <span class="meta-item live" id="hdr-status">
        <span class="live-dot"></span> LIVE
      </span>
    </div>
  </header>

  <!-- Stats Bar -->
  <div id="stats-bar" class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total Traffic</div>
      <div class="stat-value" id="stat-traffic">0 B</div>
    </div>
    <div class="stat">
      <div class="stat-label">Speed</div>
      <div class="stat-value" id="stat-speed">0 B/s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active</div>
      <div class="stat-value" id="stat-conns">0</div>
    </div>
  </div>

  <!-- Main Content: 70/30 split -->
  <div id="main" class="main-area">
    <!-- Left: Topology -->
    <div class="topo-panel">
      <div id="topo-container"></div>
    </div>
    <!-- Right: Server Status Cards -->
    <div class="cards-panel">
      <div class="cards-header">
        <span>Server Status</span>
        <span class="cards-count" id="cards-count">0</span>
      </div>
      <div id="cards-list" class="cards-list">
        <div class="empty-hint">Discovering servers...</div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
